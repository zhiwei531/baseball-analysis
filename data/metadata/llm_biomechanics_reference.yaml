version: "2026-05-25"
purpose: >
  LLM-readable biomechanics reference for baseball posture reporting.
  Split clinical passive ROM references from video-derived kinematic references.
  Use this file as a knowledge base for prompt construction, rule-based flagging,
  and plain-language report generation.

usage_notes:
  - Do not treat 2D video pose angles as direct clinical passive ROM measurements.
  - Use clinical_rom metrics only when the input comes from goniometer, physical exam, or validated 3D/markerless ROM measurement.
  - Use video_kinematics metrics for event-based pitching interpretation from pose/video pipelines.
  - When no explicit injury threshold exists in the literature, describe values as "lower/higher than common reference" rather than "abnormal" or "pathologic".
  - Prefer age-matched references over professional references for youth and high-school athletes.

