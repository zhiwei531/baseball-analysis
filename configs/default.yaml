project:
  name: baseball-analysis
  data_dir: data
  raw_video_dir: raw
  output_dir: outputs

dataset:
  clips_file: data/metadata/clips.csv
  difficulty_file: data/metadata/difficulty_labels.csv
  clip_ids:
    - batting_1
    - batting_2
    - pitching_1
    - pitching_2

video:
  target_fps: 30
  resize_longest_side: 1280
  preserve_aspect_ratio: true
  write_frames: true
  max_frames_per_clip: 180

pose:
  backend: mediapipe
  model_asset_path: models/pose_landmarker_lite.task
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  canonical_coordinate_space: normalized

pose3d:
  enabled: false
  backend: mediapipe_world
  input_condition_suffix: _smooth
  root_joint: pelvis_center
  normalize_scale: true
  min_valid_joints: 8
  confidence_threshold: 0.5
  confidence_thresholds:
    default: 0.5
    torso: 0.45
    mid_limb: 0.58
    distal: 0.62
  interpolate_max_gap_frames: 3
  interpolate_max_gap_by_group:
    default: 3
    torso: 5
    mid_limb: 3
    distal: 2
  smoothing:
    window_length: 15
    polyorder: 2
    median_window_length: 5
    refine_window_length: 9
    jump_threshold_multiplier: 3.0
    joint_jump_thresholds:
      default: 3.0
      torso: 4.0
      mid_limb: 2.8
      distal: 2.5

postprocess:
  confidence_threshold: 0.5
  confidence_thresholds:
    default: 0.5
    torso: 0.45
    mid_limb: 0.6
    distal: 0.65
  interpolate_max_gap_frames: 12
  interpolate_max_gap_by_group:
    default: 12
    torso: 12
    mid_limb: 6
    distal: 3
  smoothing:
    enabled: true
    method: savgol
    window_length: 15
    polyorder: 2
    median_window_length: 5
    refine_window_length: 9
    jump_threshold_multiplier: 4.0
    joint_jump_thresholds:
      default: 4.0
      torso: 6.0
      mid_limb: 3.5
      distal: 3.0
    torso_gate_enabled: true
    torso_jump_threshold_multiplier: 6.0
    min_torso_jump_distance: 0.06
    limb_length_tolerance_ratio: 0.28
  clip_overrides:
    test_mp4:
      confidence_thresholds:
        default: 0.5
        torso: 0.45
        mid_limb: 0.57
        distal: 0.60
      interpolate_max_gap_by_group:
        default: 12
        torso: 12
        mid_limb: 7
        distal: 4
      smoothing:
        joint_jump_thresholds:
          default: 4.0
          torso: 6.0
          mid_limb: 3.7
          distal: 3.2
        limb_length_tolerance_ratio: 0.32

experiments:
  default_conditions:
    - baseline_raw
    - roi_clahe
    - roi_clahe_smooth
  default_3d_conditions: []

conditions:
  baseline_raw:
    roi:
      enabled: false
    preprocessing: []
    postprocess:
      enabled: false
  auto_roi_raw:
    roi:
      enabled: true
      mode: auto
      expansion: 0.35
      proposal_frames: 60
      min_area_ratio: 0.002
    preprocessing: []
    postprocess:
      enabled: false
  auto_roi_pose_prior:
    roi:
      enabled: true
      mode: pose_prior
      source_condition: baseline_raw
      confidence_threshold: 0.5
      min_joints_per_frame: 4
      horizontal_padding: 0.35
      top_padding: 0.45
      bottom_padding: 0.25
    preprocessing: []
    postprocess:
      enabled: false
  center_prior_roi:
    roi:
      enabled: true
      mode: center_prior
      center_x: 0.5
      center_y: 0.5
      width_ratio: 0.62
      height_ratio: 1.0
    preprocessing: []
    postprocess:
      enabled: false
  body_prior_mask_roi:
    roi:
      enabled: true
      mode: body_prior_mask
      source_condition: center_prior_roi_smooth
      confidence_threshold: 0.5
      padding_ratio: 0.55
      min_width_ratio: 0.28
      min_height_ratio: 0.50
      limb_thickness_ratio: 0.045
      joint_radius_ratio: 0.035
      fallback_center_x: 0.5
      fallback_center_y: 0.5
      fallback_width_ratio: 0.62
      fallback_height_ratio: 1.0
    preprocessing: []
    postprocess:
      enabled: false
  image_center_motion_grabcut_pose:
    roi:
      enabled: true
      mode: image_center_motion_grabcut
      center_x: 0.5
      center_width_ratio: 0.62
      min_area_ratio: 0.006
      grabcut_iterations: 1
      processing_scale: 0.45
      vertical_body_width_ratio: 0.22
      tracker_warmup_frames: 90
      tracker_max_offset: 0.12
      tracker_max_center_step: 0.015
      tracker_max_width_step: 0.025
      tracker_center_smoothing: 0.55
      tracker_width_smoothing: 0.45
      tracker_min_width_ratio: 0.56
      tracker_max_width_ratio: 0.72
      clip_overrides:
        batting_1:
          lower_body_left_width_ratio: 0.22
          lower_body_right_width_ratio: 0.36
        batting_2:
          lower_body_width_ratio: 0.30
        test_mp4:
          center_width_ratio: 0.72
          vertical_body_width_ratio: 0.28
          lower_body_width_ratio: 0.40
          tracker_warmup_frames: 30
          tracker_max_offset: 0.18
          tracker_min_width_ratio: 0.66
          tracker_max_width_ratio: 0.84
          tracker_max_center_step: 0.022
          tracker_max_width_step: 0.035
        pitching_1:
          center_width_ratio: 0.78
          vertical_body_width_ratio: 0.34
          lower_body_width_ratio: 0.58
          tracker_min_width_ratio: 0.72
          tracker_max_width_ratio: 0.90
          tracker_max_width_step: 0.04
        pitching_2:
          center_x: 0.42
          center_width_ratio: 0.76
          vertical_body_width_ratio: 0.32
          lower_body_width_ratio: 0.56
          tracker_warmup_frames: 0
          tracker_max_offset: 0.22
          tracker_min_width_ratio: 0.70
          tracker_max_width_ratio: 0.88
          tracker_max_center_step: 0.025
          tracker_max_width_step: 0.04
    preprocessing: []
    postprocess:
      enabled: false
  baseline_raw_smooth:
    roi:
      enabled: false
    preprocessing: []
    postprocess:
      enabled: true
  auto_roi_pose_prior_smooth:
    roi:
      enabled: true
      mode: pose_prior
      source_condition: baseline_raw
      confidence_threshold: 0.5
      min_joints_per_frame: 4
      horizontal_padding: 0.35
      top_padding: 0.45
      bottom_padding: 0.25
    preprocessing: []
    postprocess:
      enabled: true
  center_prior_roi_smooth:
    roi:
      enabled: true
      mode: center_prior
      center_x: 0.5
      center_y: 0.5
      width_ratio: 0.62
      height_ratio: 1.0
    preprocessing: []
    postprocess:
      enabled: true
  body_prior_mask_roi_smooth:
    roi:
      enabled: true
      mode: body_prior_mask
      source_condition: body_prior_mask_roi
    preprocessing: []
    postprocess:
      enabled: true
  roi_clahe:
    roi:
      enabled: true
      source: data/metadata/manual_rois.csv
      expansion: 0.2
    preprocessing:
      - name: clahe
        clip_limit: 2.0
        tile_grid_size: [8, 8]
    postprocess:
      enabled: false
  roi_clahe_smooth:
    roi:
      enabled: true
      source: data/metadata/manual_rois.csv
      expansion: 0.2
    preprocessing:
      - name: clahe
        clip_limit: 2.0
        tile_grid_size: [8, 8]
    postprocess:
      enabled: true
