extends: ../default.yaml

project:
  data_dir: data_full/suzhou_rtmpose_halpe26_test
  output_dir: outputs_full/suzhou_rtmpose_halpe26_test

dataset:
  clips_file: data/metadata/clips_suzhou_full.csv
  difficulty_file: data/metadata/difficulty_labels.csv
  clip_ids:
    - suzhou_img_8084
    - suzhou_img_8139

video:
  target_fps: 30
  resize_longest_side: 1280
  preserve_aspect_ratio: true
  write_frames: true
  max_frames_per_clip: null

pose:
  backend: rtmpose
  mode: lightweight
  runtime_backend: onnxruntime
  device: cpu
  model_url: models/rtmpose-m-wholebody.onnx
  model_input_size: [192, 256]
  body_model_url: models/rtmpose-x-coco17.onnx
  body_model_input_size: [288, 384]
  source_keypoint_schema: coco_wholebody133
  keypoint_schema: halpe26
  use_masked_input: false
  min_keypoint_score: 0.0
  full_frame_fallback: true

postprocess:
  confidence_threshold: 0.12
  confidence_thresholds:
    default: 0.12
    torso: 0.12
    mid_limb: 0.50
    distal: 0.60
  overlay_confidence_threshold: 0.12
  overlay_confidence_thresholds:
    default: 0.12
    torso: 0.12
    mid_limb: 0.50
    distal: 0.60
    joint_overrides:
      left_elbow: 0.50
      right_elbow: 0.50
      left_wrist: 0.60
      right_wrist: 0.60
  interpolate_max_gap_frames: 4
  interpolate_max_gap_by_group:
    default: 4
    torso: 4
    mid_limb: 4
    distal: 8
  smoothing:
    enabled: true
    method: savgol
    window_length: 15
    window_lengths:
      default: 15
      torso: 15
      mid_limb: 7
      distal: 7
    polyorder: 2
    median_window_length: 5
    median_window_lengths:
      default: 5
      torso: 5
      mid_limb: 3
      distal: 3
    refine_window_length: 9
    refine_window_lengths:
      default: 9
      torso: 9
      mid_limb: 3
      distal: 3
    jump_threshold_multiplier: 3.4
    joint_jump_thresholds:
      default: 3.4
      torso: 5.0
      mid_limb: 3.0
      distal: 2.7
    torso_gate_enabled: true
    torso_jump_threshold_multiplier: 5.0
    min_torso_jump_distance: 0.12
    min_valid_segment_frames: 4
    limb_length_tolerance_ratio: 0.80
    foot_length_tolerance_ratio: 0.85

completion:
  confidence_threshold: 0.12
  confidence_thresholds:
    default: 0.12
    torso: 0.12
    mid_limb: 0.50
    distal: 0.60
  max_gap_frames: 6
  max_gap_by_group:
    default: 6
    mid_limb: 6
    distal: 8
  imputed_confidence: 0.62
  rescue_low_confidence: false
  rescue_min_confidence: 0.03
  rescue_temporal_only_min_confidence: 0.30
  rescue_limb_tolerance_ratio: 0.85
  rescue_temporal_tolerance: 0.14

equipment_tracking:
  conditions:
    - image_center_motion_grabcut_pose_complete_smooth
  disable_bat_clip_ids:
    - suzhou_img_8139
  enable_ball_clip_ids:
    - suzhou_img_8139
  motion_backend: background
  motion_background_samples: 60
  motion_background_threshold: 28
  motion_frame_threshold: 18
  motion_min_area_px: 8
  motion_dilate_iterations: 1
  detect_ball_for_batting: false
  detect_ball_for_pitching: true
  bat_min_line_length_ratio: 0.07
  bat_max_line_length_ratio: 0.30
  bat_max_line_gap_ratio: 0.025
  bat_max_handle_distance_ratio: 0.08
  bat_max_wrist_spread_ratio: 0.16
  bat_max_frame_jump_ratio: 0.14
  bat_smoothing_window_frames: 9
  bat_smoothing_passes: 3
  bat_smoothing_contact_margin_frames: 4
  bat_smoothing_contact_original_weight: 0.35
  ball_min_radius_px: 3
  ball_max_radius_px: 13
  ball_max_area_px: 650
  ball_max_aspect_ratio: 5.0
  ball_start_anchor_distance_ratio: 0.10
  ball_max_below_anchor_ratio: 0.08
  ball_max_y_ratio: 0.55
  ball_max_frame_jump_ratio: 0.10
  feature_bat_confidence_threshold: 0.48
  feature_ball_confidence_threshold: 0.48
  feature_max_bat_speed_px_s: 8000
  feature_max_ball_speed_px_s: 12000

experiments:
  name: rtmpose_suzhou_test
  default_conditions:
    - image_center_motion_grabcut_pose
    - image_center_motion_grabcut_pose_complete
    - image_center_motion_grabcut_pose_smooth
    - image_center_motion_grabcut_pose_complete_smooth

conditions:
  image_center_motion_grabcut_pose_complete:
    roi:
      enabled: true
      mode: image_center_motion_grabcut
      source_condition: image_center_motion_grabcut_pose
    preprocessing: []
    postprocess:
      enabled: true
  image_center_motion_grabcut_pose_smooth:
    roi:
      enabled: true
      mode: image_center_motion_grabcut
      source_condition: image_center_motion_grabcut_pose
    preprocessing: []
    postprocess:
      enabled: true
  image_center_motion_grabcut_pose_complete_smooth:
    roi:
      enabled: true
      mode: image_center_motion_grabcut
      source_condition: image_center_motion_grabcut_pose_complete
    preprocessing: []
    postprocess:
      enabled: true
